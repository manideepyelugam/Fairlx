name: Docker Build & Publish

on:
  push:
    branches: [main]

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Bump patch version
        id: ver
        run: |
          CUR=$(python3 -c "import json; print(json.load(open('version.json'))['version'])")
          IFS='.' read -r MA MI PA <<< "$CUR"
          NEW="$MA.$MI.$((PA + 1))"
          echo "{\"version\": \"$NEW\"}" > version.json
          echo "version=$NEW" >> $GITHUB_OUTPUT

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json
          git commit -m "chore: bump version to ${{ steps.ver.outputs.version }} [skip ci]"
          git pull --rebase
          git push

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/fairlx:${{ steps.ver.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/fairlx:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
